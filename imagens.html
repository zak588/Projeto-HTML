<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens</title>
    <style>
        p{
            position: absolute;
            display: none;
        }

        .circular{
            width: 513px;
            background-color: #444;
        }

        .texto{
            width: 400px;
        }

        .texto img{
            margin-right: 10px;
        }

        .cidade{
            width: 513px;
            height: 342px;
            background-image: url('http://files.cod3r.com.br/curso-web/imagem4.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 200%;
        }
    </style>
</head>
<body>
    <div wm-slider>
        <p>
            <img src="http://files.cod3r.com.br/curso-web/imagem1.jpg" 
            alt="Muro da cidade"
            width="513" height="342"
            title="Muro da Cidade por Tarso Bessa">
        </p>

        <p>
            <img src="http://files.cod3r.com.br/curso-web/imagem2.gif" 
            alt="intro do Cod3r"
            height="342">
        </p>

        <p class="circular">
            <img src="http://files.cod3r.com.br/curso-web/imagem3.png"  
            alt="Rio de Janeiro" height="342">
        </p>

        <p class="texto">
            <img src="http://files.cod3r.com.br/curso-web/avatar.jpg" 
            alt="avatar" height="50" align="left">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. 
            Fugit ratione quis praesentium quam! Quibusdam dolores veritatis libero 
            ducimus, dignissimos recusandae corrupti temporibus nostrum totam 
            repellendus sit hic possimus, fugiat doloremque!
        </p>

        <p class="cidade"></p>
    </div>
    <script>
    function mover(elem, inicio, fim, passo, callback) {
        const novoInicio = inicio - passo;

        if (novoInicio >= fim) {
            elem.style.left = novoInicio + 'px'; 
            setTimeout(() => mover(elem, novoInicio, fim, passo, callback), 7);
        } else {
            callback();
        }
    }

    function slider() {
        const elementos = document.querySelectorAll('[wm-slider] > p');
        const slides = Array.from(elementos);
        exibirSlide(slides, slides[0]);
    }

    function exibirSlide(slides, slide) {
        slide.style.display = 'block';

        const inicio = window.innerWidth;
        const fim = -slide.clientWidth; 

        slide.style.left = `${inicio}px`;

        mover(slide, inicio, fim, 5, () => {
            slide.style.display = 'none';
            exibirSlide(slides, getProximo(slides, slide)); 
        });
    }

    function getProximo(lista, atual) {
        const i = lista.indexOf(atual) + 1;
        return i < lista.length ? lista[i] : lista[0];
    }

    // inicialização
    slider();
</script>
</body>
</html>
